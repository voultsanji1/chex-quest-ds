name: Feature request
description: Suggest an improvement or a new feature for Chex Quest DS
title: "[REQUEST] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: A clear description of the need or limitation.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Target device
      options:
        - DSi XL
        - DSi
        - 3DS / 2DS
        - DS Lite
        - Original DS
        - Any / all
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Note: some things are out of scope for this vanilla-accurate port
        (e.g. OPL3 music on ARM9, in-game typed text/chat, widescreen).
        See the README "Things that will NOT be added" section.
