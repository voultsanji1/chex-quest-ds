name: Build Chex Quest DS

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Nintendo DS ROM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download Chex Quest assets
        run: bash scripts/fetch_assets.sh

      - name: Build NDS ROM (BlocksDS)
        run: |
          docker run --rm -v "$PWD":/work -w /work skylyrac/blocksds:slim-latest \
            bash -c "make -C arm7 && make -f Makefile.arm9"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chexquest-nds-${{ github.sha }}
          path: chexquest.nds

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, "refs/tags/v")
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: chexquest-nds-${{ github.sha }}

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: Chex Quest DS ${{ github.ref_name }}
          body: |
            Chex Quest DS ${{ github.ref_name }}

            Flash `chexquest.nds` to your Nintendo DS (Slot-1 flashcart, or
            DSi/3DS via a modern homebrew menu such as NDS Homebrew Menu).

            The ROM is self-contained: it already includes chex.wad and
            chex.deh, so just launch it and the game starts.
          artifacts: chexquest.nds
          draft: false
